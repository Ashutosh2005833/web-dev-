<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - Form Submissions</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 2rem;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        .header {
            background: white;
            border-radius: 12px;
            padding: 2rem;
            margin-bottom: 2rem;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }
        
        .header h1 {
            color: #333;
            margin-bottom: 0.5rem;
        }
        
        .header p {
            color: #666;
            font-size: 0.9rem;
        }
        
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
            margin-top: 1.5rem;
        }
        
        .stat-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 1.5rem;
            border-radius: 8px;
            text-align: center;
        }
        
        .stat-value {
            font-size: 2rem;
            font-weight: bold;
            margin-bottom: 0.5rem;
        }
        
        .stat-label {
            font-size: 0.9rem;
            opacity: 0.9;
        }
        
        .submissions-container {
            background: white;
            border-radius: 12px;
            padding: 2rem;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }
        
        .submissions-container h2 {
            color: #333;
            margin-bottom: 1.5rem;
            border-bottom: 2px solid #667eea;
            padding-bottom: 0.5rem;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
        }
        
        thead {
            background: #f5f5f5;
        }
        
        th {
            text-align: left;
            padding: 1rem;
            color: #333;
            font-weight: 600;
            border-bottom: 2px solid #ddd;
        }
        
        td {
            padding: 1rem;
            border-bottom: 1px solid #eee;
            color: #555;
        }
        
        tr:hover {
            background: #f9f9f9;
        }
        
        .timestamp {
            font-size: 0.85rem;
            color: #999;
        }
        
        .message-cell {
            max-width: 300px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        
        .loading {
            text-align: center;
            padding: 2rem;
            color: #666;
        }
        
        .error {
            background: #fee;
            color: #c33;
            padding: 1rem;
            border-radius: 8px;
            margin: 1rem 0;
            border-left: 4px solid #c33;
        }
        
        .success {
            background: #efe;
            color: #3c3;
            padding: 1rem;
            border-radius: 8px;
            margin: 1rem 0;
            border-left: 4px solid #3c3;
        }
        
        .no-data {
            text-align: center;
            padding: 3rem;
            color: #999;
            font-style: italic;
        }
        
        .back-link {
            display: inline-block;
            margin-bottom: 1rem;
            color: white;
            text-decoration: none;
            background: rgba(255, 255, 255, 0.2);
            padding: 0.7rem 1.5rem;
            border-radius: 6px;
            transition: 0.3s;
        }
        
        .back-link:hover {
            background: rgba(255, 255, 255, 0.3);
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="/" class="back-link">← Back to Website</a>
        
        <div class="header">
            <h1>📊 Form Submissions Admin Panel</h1>
            <p>View all contact form submissions from your website</p>
            <div class="stats" id="stats">
                <div class="loading">Loading statistics...</div>
            </div>
        </div>
        
        <div class="submissions-container">
            <h2>📋 All Submissions</h2>
            <div id="table-container">
                <div class="loading">Loading submissions...</div>
            </div>
        </div>
    </div>
    
    <script>
        async function loadStats() {
            try {
                const response = await fetch('/api/stats');
                const data = await response.json();
                
                if (data.success && data.stats) {
                    const stats = data.stats;
                    document.getElementById('stats').innerHTML = `
                        <div class="stat-card">
                            <div class="stat-value">${stats.total_submissions || 0}</div>
                            <div class="stat-label">Total Submissions</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-value">${stats.website_types || 0}</div>
                            <div class="stat-label">Website Types</div>
                        </div>
                    `;
                }
            } catch (error) {
                console.error('Error loading stats:', error);
            }
        }
        
        async function loadSubmissions() {
            try {
                const response = await fetch('/api/submissions');
                const data = await response.json();
                
                if (data.success && data.submissions && data.submissions.length > 0) {
                    let html = `
                        <table>
                            <thead>
                                <tr>
                                    <th>#</th>
                                    <th>Name</th>
                                    <th>Phone</th>
                                    <th>Email</th>
                                    <th>Website Type</th>
                                    <th>Budget</th>
                                    <th>Message</th>
                                    <th>Date</th>
                                </tr>
                            </thead>
                            <tbody>
                    `;
                    
                    data.submissions.forEach((sub, index) => {
                        const date = new Date(sub.submitted_at).toLocaleDateString('en-IN', {
                            year: 'numeric',
                            month: 'short',
                            day: 'numeric',
                            hour: '2-digit',
                            minute: '2-digit'
                        });
                        
                        html += `
                            <tr>
                                <td>${index + 1}</td>
                                <td><strong>${sub.name}</strong></td>
                                <td><a href="tel:${sub.phone}">${sub.phone}</a></td>
                                <td>${sub.email ? `<a href="mailto:${sub.email}">${sub.email}</a>` : '-'}</td>
                                <td>${sub.website_type || '-'}</td>
                                <td>${sub.budget || '-'}</td>
                                <td class="message-cell" title="${sub.message || ''}">${sub.message || '-'}</td>
                                <td class="timestamp">${date}</td>
                            </tr>
                        `;
                    });
                    
                    html += `
                            </tbody>
                        </table>
                    `;
                    
                    document.getElementById('table-container').innerHTML = html;
                } else if (data.submissions && data.submissions.length === 0) {
                    document.getElementById('table-container').innerHTML = '<div class="no-data">No submissions yet</div>';
                } else {
                    document.getElementById('table-container').innerHTML = '<div class="error">Error loading submissions</div>';
                }
            } catch (error) {
                console.error('Error:', error);
                document.getElementById('table-container').innerHTML = '<div class="error">Failed to load submissions. Make sure the server is running.</div>';
            }
        }
        
        // Load data on page load
        loadStats();
        loadSubmissions();
        
        // Refresh every 30 seconds
        setInterval(() => {
            loadStats();
            loadSubmissions();
        }, 30000);
    </script>
</body>
</html>
